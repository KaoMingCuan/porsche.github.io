<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yêu cầu tư vấn | Porsche</title>
  <style>
    :root {--primary-color:#000;--accent-color:#ba0c2f;--bg-light:#f4f4f4;--bg-white:#fff;--text-dark:#111;--border-color:#ddd;}
    body{font-family:Arial,sans-serif;background:var(--bg-light);color:var(--text-dark);margin:0;padding:0;}
    .container{max-width:960px;margin:40px auto;background:var(--bg-white);padding:30px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
    h1{text-align:center;font-size:2.5rem;margin-bottom:20px;color:var(--primary-color);}
    section{margin-bottom:30px;}
    section h2{font-size:1.5rem;border-bottom:2px solid var(--accent-color);padding-bottom:8px;margin-bottom:16px;color:var(--primary-color);}
    .product-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border:1px solid var(--border-color);margin-bottom:12px;border-radius:4px;background:var(--bg-white);}
    .product-item label{flex:1;cursor:pointer;}
    .product-item input{margin-right:10px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;margin-bottom:6px;font-weight:bold;}
    .form-group input,.form-group textarea{width:100%;padding:10px;border:1px solid var(--border-color);border-radius:4px;font-size:1rem;}
    button{padding:8px 16px;cursor:pointer;border:none;background:var(--accent-color);color:var(--bg-white);border-radius:4px;font-size:0.9rem;transition:background-color .3s;}
    button:hover{background:#8f0a24;}
    .map-section{margin-top:40px;}
    .map-cards{display:flex;gap:20px;}
    .map-card{flex:1;border:1px solid var(--border-color);height:300px;}
    .map-card h4{text-align:center;margin:8px 0;}
    .map-card iframe{width:100%;height:100%;border:0;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Chọn sản phẩm & Yêu cầu tư vấn</h1>

    <section class="products">
      <h2>Chọn mẫu xe quan tâm</h2>
      <div class="product-item"><label><input type="checkbox" value="718">718</label></div>
      <div class="product-item"><label><input type="checkbox" value="911">911</label></div>
      <div class="product-item"><label><input type="checkbox" value="Taycan">Taycan</label></div>
      <div class="product-item"><label><input type="checkbox" value="Panamera">Panamera</label></div>
      <div class="product-item"><label><input type="checkbox" value="Macan">Macan</label></div>
      <div class="product-item"><label><input type="checkbox" value="Cayenne">Cayenne</label></div>
    </section>

    <section class="contact-form">
      <h2>Thông tin liên hệ</h2>
      <div class="form-group"><label for="name">Họ và tên:</label><input type="text" id="name" placeholder="Nhập họ tên"></div>
      <div class="form-group"><label for="phone">Số điện thoại:</label><input type="text" id="phone" placeholder="Nhập số điện thoại"></div>
      <div class="form-group"><label for="email">Email:</label><input type="email" id="email" placeholder="Nhập email"></div>
      <div class="form-group"><label for="message">Yêu cầu thêm:</label><textarea id="message" rows="4" placeholder="Ghi chú thêm..."></textarea></div>
      <button onclick="submitConsult()">Gửi yêu cầu</button>
    </section>

    <!-- Bản đồ cửa hàng giữ nguyên -->
     <section class="map" style="margin-top:40px;">
      <h2>Bản đồ địa chỉ cửa hàng</h2>
      <div style="width:100%;height:400px;border:1px solid var(--border-color);">
        <iframe
          src="https://maps.google.com/maps?q=Trung%20T%C3%A2m%20Porsche%20S%C3%A0i%20G%C3%B2n|Trung%20T%C3%A2m%20Porsche%20H%C3%A0%20N%E1%BB%99i&z=5&output=embed"
          width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </section>
  </div>

  <script>
    function submitConsult() {
      const selected = [...document.querySelectorAll('.product-item input:checked')].map(i=>i.value);
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!name||!phone||!email||selected.length===0) {
        alert('Vui lòng chọn ít nhất 1 mẫu xe và nhập đầy đủ thông tin.'); return;
      }
      alert(`Yêu cầu tư vấn đã gửi:\nXe: ${selected.join(', ')}\nTên: ${name}\nĐiện thoại: ${phone}\nEmail: ${email}`);
    }
  </script>
</body>
</html>
